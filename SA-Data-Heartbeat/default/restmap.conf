# Custom REST endpoint for in-app admin actions (enable/disable searches,
# fire test alerts). Bypasses the splunkweb proxy filter on disabled-field
# POSTs that we hit when toggling Alert + Auto Discovery from the dashboard.

[script:heartbeat_admin]
match                 = /data_heartbeat/admin
script                = heartbeat_admin.py
scripttype            = persist
handler               = heartbeat_admin.HeartbeatAdminHandler
output_modes          = json
passSystemAuth        = true
python.version        = python3
# Splunk 10.2+ replacement (python.version is deprecated). Both shipped so
# the handler runs on Enterprise <10.2 and the newer directive on 10.2+.
python.required       = 3.13
requireAuthentication = true
