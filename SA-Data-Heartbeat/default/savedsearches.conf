#
# Saved Searches for SA-Data-Heartbeat
#

# One-time migration: copy CSV-seeded rows to the KV-store collection on
# first install. JS dispatches this on dashboard load if KV is empty. It
# upserts by _key=sourcetype so re-running is idempotent.
#
# Ships disabled=1 so a Splunk Manager admin can't accidentally click "Run"
# and overwrite live KV data with the stale CSV seed. The JS dispatches it
# directly via REST when (and only when) KV is empty.
[Data Heartbeat - CSV to KV Migration]
description = One-time copy of monitored_sourcetypes.csv into the KV-store collection. Idempotent; safe to re-run.
search = | inputlookup monitored_sourcetypes_csv | eval _key = sourcetype | eval alert_action = coalesce(alert_action, "none") | eval alert_action_config = coalesce(alert_action_config, "") | outputlookup monitored_sourcetypes_lookup append=true
dispatch.earliest_time = -1m
dispatch.latest_time = now
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat

# Detection search - runs on configurable schedule
[Data Heartbeat - Source Type Monitor]
description = Detects source types that haven't logged data within their configured threshold
search = | inputlookup monitored_sourcetypes_lookup \
| rename sourcetype as monitored_sourcetype \
| join type=left monitored_sourcetype \
    [| metadata type=sourcetypes index=* OR index=_* \
    | rename lastTime as last_event_time, sourcetype as monitored_sourcetype \
    | stats max(last_event_time) as last_event_time by monitored_sourcetype] \
| eval now_time = now() \
| eval last_seen = coalesce(last_event_time, 0) \
| eval minutes_since_seen = round((now_time - last_seen) / 60, 1) \
| eval old_status = status \
| eval status = if(minutes_since_seen > tonumber(threshold_minutes) OR last_seen = 0, "flagged", "good") \
| eval status_changed = if(old_status != status, 1, 0) \
| eval alert_action = coalesce(alert_action, "none") \
| eval alert_action_config = coalesce(alert_action_config, "") \
| table monitored_sourcetype, threshold_minutes, last_seen, minutes_since_seen, status, importance, discovery_source, usage_count, added_by, added_time, notes, alert_action, alert_action_config \
| rename monitored_sourcetype as sourcetype \
| eval _key = sourcetype | outputlookup monitored_sourcetypes_lookup
cron_schedule = 1-59/5 * * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 0
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat
request.ui_dispatch_view = search

# Nightly backup: dump KV-store collection to monitored_sourcetypes_backup.csv.
# Lets the operator recover from KV corruption / accidental wipe by running the
# "Restore from CSV backup" saved search (below) which inversely copies CSV → KV.
[Data Heartbeat - Nightly KV Backup]
description = Dumps the monitored_sourcetypes KV-store collection to a backup CSV every night. Recovery path for KV failure / accidental wipe.
search = | inputlookup monitored_sourcetypes_lookup | outputlookup monitored_sourcetypes_backup.csv
cron_schedule = 0 3 * * *
dispatch.earliest_time = -1m
dispatch.latest_time = now
enableSched = 0
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat

# Disaster recovery: re-seed KV from the nightly backup CSV.
# Dispatched on demand by the operator (UI button in Settings, or via REST).
#
# Ships disabled=1 so this destructive write-path can't be triggered
# accidentally from Splunk Manager — operator must enable it intentionally
# before restoring (or invoke via REST from the UI which does so transiently).
# Bails out if the backup CSV is empty / malformed so a corrupt or partially-
# written backup file doesn't clobber live KV with garbage.
[Data Heartbeat - Restore from Backup]
description = One-shot search that re-seeds the KV-store collection from monitored_sourcetypes_backup.csv. Run after KV corruption / accidental wipe.
search = | inputlookup monitored_sourcetypes_backup.csv | where isnotnull(sourcetype) AND sourcetype!="" | eventstats count as _backup_row_count | where _backup_row_count > 0 | fields - _backup_row_count | eval _key = sourcetype | outputlookup monitored_sourcetypes_lookup append=true
dispatch.earliest_time = -1m
dispatch.latest_time = now
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat

# Self-monitoring metrics: capture detection_duration_ms + rows_processed each
# detection run. Appends to the heartbeat_audit_log lookup so it's queryable
# for SLOs without writing to `_internal` (which is forbidden for the `nobody`
# user on Splunk Cloud — the prior `| collect index=_internal` failed there).
[Data Heartbeat - Health Metrics]
description = Records detection-run health (duration, rows processed, flagged count) to the heartbeat_audit_log lookup for SLO tracking.
search = | inputlookup monitored_sourcetypes_lookup \
| eval flagged = if(status="flagged", 1, 0), pending = if(status="pending", 1, 0), good = if(status="good", 1, 0) \
| stats count as rows_processed, sum(flagged) as flagged_count, sum(pending) as pending_count, sum(good) as good_count \
| eval app = "SA-Data-Heartbeat", metric_name = "heartbeat.health", timestamp = now(), action = "health_metric" \
| eval detection_duration_ms = 0 \
| outputlookup heartbeat_audit_log append=true
cron_schedule = 2-59/5 * * * *
dispatch.earliest_time = -1m
dispatch.latest_time = now
enableSched = 0
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat

# Monitor-the-monitor: pages operator when detection hasn't run in 15 min
# (cron is every 5 min so 3x cron-interval is the grace window). Built-in
# fallback for "the thing meant to alert me stopped alerting me."
#
# last_actual_run_time comes back from `| rest` in different formats across
# Splunk versions:
#   - 9.x: ISO-8601 with offset    "2026-05-18T12:34:56+0000"
#   - 10.x: space-delimited+zone   "2026-05-18 12:34:56 UTC"
#   - some cloud builds: epoch     "1779108296"
# The coalesce tries each shape so the alert actually fires regardless of
# the platform — the prior strict ISO-only parse returned null on most
# real-world installs, silently disabling the monitor.
[Data Heartbeat - Detection Stalled]
description = Fires when the Detection search hasn't recorded health metrics in 15 minutes (3x its cron). Catches the meta-failure where the monitor itself stops monitoring.
search = | rest /servicesNS/-/-/saved/searches splunk_server=local \
| search title="Data Heartbeat - Source Type Monitor" \
| eval last_run_epoch = coalesce( \
    tonumber(last_actual_run_time), \
    strptime(last_actual_run_time, "%Y-%m-%dT%H:%M:%S%z"), \
    strptime(last_actual_run_time, "%Y-%m-%dT%H:%M:%S%Z"), \
    strptime(last_actual_run_time, "%Y-%m-%d %H:%M:%S %Z"), \
    strptime(last_actual_run_time, "%Y-%m-%d %H:%M:%S")) \
| eval last_run_age_min = round((now() - last_run_epoch) / 60, 1) \
| where isnotnull(last_run_epoch) AND last_run_age_min > 15 \
| table title, last_actual_run_time, last_run_age_min
cron_schedule = 7-59/15 * * * *
dispatch.earliest_time = -1m
dispatch.latest_time = now
enableSched = 0
disabled = 1
is_visible = 1
alert.track = 1
alert.severity = 3
counttype = number of events
relation = greater than
quantity = 0
request.ui_dispatch_app = SA-Data-Heartbeat

# Alert for flagged source types.
#
# Per-sourcetype suppression: once a sourcetype fires, it's suppressed for
# 1 hour. Without this, a persistently-flagged sourcetype would re-fire every
# 10 minutes forever — Slack/Teams/email floods until the upstream feed is
# fixed. The suppression key is `sourcetype` so different flagged sourcetypes
# still alert independently within the same window.
[Data Heartbeat Alert - Flagged Sources]
description = Alerts when source types are flagged for missing data
search = | inputlookup monitored_sourcetypes_lookup \
| where status="flagged" \
| where alert_action!="none" \
| table sourcetype, threshold_minutes, minutes_since_seen, status, importance, alert_action, alert_action_config
cron_schedule = */10 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 0
disabled = 1
is_visible = 1
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 1h
alert.suppress.fields = sourcetype
alert.digest_mode = 0
counttype = number of events
relation = greater than
quantity = 0
# Routes per-row notifications via bin/heartbeat_dispatch.py (email / slack / teams / webhook)
action.heartbeat_dispatch = 1
request.ui_dispatch_app = SA-Data-Heartbeat

# Auto-Discovery Search - finds important source types
[Data Heartbeat - Auto Discovery]
description = Discovers important source types from scheduled searches, correlation searches, dashboards, and audit logs
search = | append \
    [| rest /servicesNS/-/-/saved/searches splunk_server=local \
    | search is_scheduled=1 disabled=0 \
    | rex field=search max_match=100 "sourcetype\s*=\s*(?<discovered_st>[^\s\"\'\|\)]+)" \
    | rex field=search max_match=100 "sourcetype\s*=\s*\"(?<discovered_st_q>[^\"]+)\"" \
    | rex field=search max_match=100 "sourcetype\s*=\s*\'(?<discovered_st_sq>[^\']+)\'" \
    | eval discovered_sourcetype=coalesce(discovered_st, discovered_st_q, discovered_st_sq) \
    | where isnotnull(discovered_sourcetype) \
    | stats count as usage_count values(title) as search_names by discovered_sourcetype \
    | eval discovery_source="scheduled_searches" \
    | rename discovered_sourcetype as sourcetype] \
| append \
    [| rest /servicesNS/-/-/saved/searches splunk_server=local \
    | search action.correlationsearch.enabled=1 disabled=0 \
    | rex field=search max_match=100 "sourcetype\s*=\s*(?<discovered_st>[^\s\"\'\|\)]+)" \
    | rex field=search max_match=100 "sourcetype\s*=\s*\"(?<discovered_st_q>[^\"]+)\"" \
    | eval discovered_sourcetype=coalesce(discovered_st, discovered_st_q) \
    | where isnotnull(discovered_sourcetype) \
    | stats count as usage_count values(title) as search_names by discovered_sourcetype \
    | eval discovery_source="correlation_searches" \
    | rename discovered_sourcetype as sourcetype] \
| append \
    [| rest /servicesNS/-/-/data/ui/views splunk_server=local \
    | rex field="eai:data" max_match=100 "sourcetype\s*=\s*(?<discovered_st>[^\s\"\'\|\)\<]+)" \
    | rex field="eai:data" max_match=100 "sourcetype\s*=\s*\"(?<discovered_st_q>[^\"]+)\"" \
    | eval discovered_sourcetype=coalesce(discovered_st, discovered_st_q) \
    | where isnotnull(discovered_sourcetype) \
    | stats count as usage_count values(title) as dashboard_names by discovered_sourcetype \
    | eval discovery_source="dashboards" \
    | rename discovered_sourcetype as sourcetype] \
| append \
    [| search index=_audit action=search info=completed \
    | rex field=search max_match=100 "sourcetype\s*=\s*(?<discovered_st>[^\s\"\'\|\)]+)" \
    | rex field=search max_match=100 "sourcetype\s*=\s*\"(?<discovered_st_q>[^\"]+)\"" \
    | eval discovered_sourcetype=coalesce(discovered_st, discovered_st_q) \
    | where isnotnull(discovered_sourcetype) \
    | stats count as usage_count dc(user) as user_count by discovered_sourcetype \
    | where usage_count > 5 \
    | eval discovery_source="audit_logs" \
    | rename discovered_sourcetype as sourcetype] \
| stats sum(usage_count) as total_usage values(discovery_source) as sources by sourcetype \
| eval discovery_source=mvjoin(sources, ",") \
| eval primary_source=mvindex(sources, 0) \
| eval importance=case( \
    total_usage >= 40, "critical", \
    total_usage >= 20, "high", \
    total_usage >= 10, "medium", \
    1=1, "low") \
| eval threshold_minutes=case( \
    importance="critical", 30, \
    importance="high", 60, \
    importance="medium", 120, \
    1=1, 180) \
| eval status="pending", added_by="discovery", added_time=now(), notes="Auto-discovered from ".primary_source \
| sort - total_usage \
| head 100 \
| rename total_usage as usage_count, primary_source as discovery_source \
| table sourcetype, threshold_minutes, status, importance, discovery_source, usage_count, added_by, added_time, notes
cron_schedule = 0 2 * * *
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
enableSched = 0
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat
request.ui_dispatch_view = search
