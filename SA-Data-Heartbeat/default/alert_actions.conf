# Custom alert action that routes per-row notifications based on the
# heartbeat_alert_actions.csv lookup. See bin/heartbeat_dispatch.py.

[heartbeat_dispatch]
label = Data Heartbeat - Per-Row Notify
description = Routes alerts per sourcetype based on heartbeat_alert_actions.csv (email / slack / teams / webhook).
icon_path = appIcon.png
is_custom = 1
payload_format = json
python.version = python3
command = python3 "$SPLUNK_HOME/etc/apps/SA-Data-Heartbeat/bin/heartbeat_dispatch.py" --execute
