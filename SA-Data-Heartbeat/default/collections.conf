#
# KV Store Collections for SA-Data-Heartbeat
#

[monitored_sourcetypes]
# enforceTypes=false on purpose: alert_action_config holds arbitrary strings
# (email lists, webhook URLs, channel names) and the dispatcher tolerates
# whatever the user puts in.
enforceTypes = false
field.sourcetype = string
field.threshold_minutes = number
field.last_seen = number
field.minutes_since_seen = number
field.status = string
field.importance = string
field.discovery_source = string
field.usage_count = number
field.added_by = string
field.added_time = number
field.notes = string
field.alert_action = string
field.alert_action_config = string
accelerated_fields.idx_sourcetype = {"sourcetype": 1}
accelerated_fields.idx_status = {"status": 1}

[heartbeat_settings]
enforceTypes = true
field.setting_name = string
field.setting_value = string
field.description = string

[discovery_sources]
enforceTypes = true
field.sourcetype = string
field.source_type = string
field.source_name = string
field.discovered_time = number
