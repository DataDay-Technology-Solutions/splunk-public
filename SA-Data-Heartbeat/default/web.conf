# Expose the custom REST endpoint to splunkweb's /__raw/ proxy.
# Without this stanza, /en-US/splunkd/__raw/services/data_heartbeat/admin
# returns 404 from splunkweb (even though splunkd-direct on 8089 serves it
# fine). The JS dashboard hits this through splunkweb, so the expose is
# required for the "Enable Monitoring" button + Send Test Alert button.

# Splunkweb's /__raw/ proxy rejects custom REST paths unless they're listed
# here. Splunk's expose pattern uses the path AFTER /__raw/services/ or
# /__raw/servicesNS/<ns>/<app>/ — so the leaf pattern matches both forms.

[expose:data_heartbeat_admin_post]
pattern  = data_heartbeat/admin
methods  = GET, POST, HEAD, OPTIONS

[expose:data_heartbeat_admin_ns]
pattern  = servicesNS/nobody/SA-Data-Heartbeat/data_heartbeat/admin
methods  = GET, POST, HEAD, OPTIONS

[expose:data_heartbeat_admin_full]
pattern  = services/data_heartbeat/admin
methods  = GET, POST, HEAD, OPTIONS
