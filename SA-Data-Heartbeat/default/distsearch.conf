# Search-head-cluster replication policy for this app's CSV-backed lookups.
#
# KV-store collections (monitored_sourcetypes_lookup, heartbeat_settings_lookup)
# auto-replicate via the kvstore mechanism on a SHC, so they don't need to be
# listed here. The CSV lookups below DO require an explicit whitelist or they
# stay local to whichever search head wrote them — which on Splunk Cloud's SHC
# would mean the audit log + alert-action config diverge per node.

[replicationWhitelist]
heartbeat_lookups = apps/SA-Data-Heartbeat/lookups/*.csv
